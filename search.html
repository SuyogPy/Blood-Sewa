<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Search Donors - Blood Sewa</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="container">
    <h2>Search Donors</h2>
    <form id="searchForm">
      <label>Blood Group <input name="blood_group"></label>
      <label>City <input name="city"></label>
      <button type="submit">Search</button>
    </form>
    <ul id="results"></ul>
  </main>
  <script src="assets/app.js"></script>
  <script>
  document.getElementById('searchForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const params = new URLSearchParams(Object.fromEntries(fd.entries()));
    const res = await fetch('api/search.php?' + params.toString());
    const json = await res.json();
    const ul = document.getElementById('results');
    ul.innerHTML = '';
    if (json.results) {
      json.results.forEach(r => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `donor.html?id=${r.id}`;
        a.textContent = `${r.name} — ${r.blood_group} — ${r.city} — ${r.phone || ''}`;
        a.style.color = '#0b61c7';
        ul.appendChild(li);
        li.appendChild(a);
      });
    }
  });
  </script>
</body>
</html>
